<!DOCTYPE html>
<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Scholarly Admin - Profile</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<style>
.material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
body { font-family: 'Inter', sans-serif; background-color: #f7f9fc; }
</style>
</head>
<body class="bg-surface text-on-surface">
<header class="bg-white border-b border-slate-200 shadow-sm h-16 px-6 flex items-center justify-between">
  <div class="flex items-center gap-3"><span class="text-xl font-bold tracking-tight text-[#1a237e]">Scholarly Admin</span><span class="text-xs text-slate-500 uppercase tracking-wide">Profile Management</span></div>
  <button class="px-4 py-2 border border-[#1a237e] text-[#1a237e] rounded-lg font-semibold" data-action="logout" type="button">Logout</button>
</header>
<main class="max-w-6xl mx-auto p-6 grid grid-cols-1 lg:grid-cols-3 gap-6">
  <section class="lg:col-span-1 bg-white border border-slate-200 rounded-xl p-6">
    <div class="w-20 h-20 rounded-full bg-[#1a237e] text-white grid place-items-center text-2xl font-bold">S</div>
    <h2 class="mt-4 text-xl font-bold text-[#1a237e]">My Profile</h2>
    <p class="text-sm text-slate-500 mt-2">Editable fields follow service policy: immutable institutional fields are hidden from update payload.</p>
    <div class="mt-4 text-xs text-slate-500 space-y-2">
      <p><span class="font-semibold">RBAC:</span> Student / Faculty / Admin / Warden</p>
      <p><span class="font-semibold">Service:</span> User Profile Management</p>
      <p><span class="font-semibold">Endpoint:</span> PUT /api/user/profile</p>
    </div>
  </section>
  <section class="lg:col-span-2 bg-white border border-slate-200 rounded-xl p-6">
    <form class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <div class="md:col-span-2">
        <label class="text-xs font-semibold uppercase tracking-wide text-slate-500">Full Name</label>
        <input class="w-full rounded-lg border-slate-300" name="fullName" placeholder="Sarah Mitchell" type="text"/>
      </div>
      <div>
        <label class="text-xs font-semibold uppercase tracking-wide text-slate-500">Phone Number</label>
        <input class="w-full rounded-lg border-slate-300" name="phoneNumber" placeholder="+91-98XXXXXXXX" type="text"/>
      </div>
      <div>
        <label class="text-xs font-semibold uppercase tracking-wide text-slate-500">Emergency Contact</label>
        <input class="w-full rounded-lg border-slate-300" name="emergencyContact" placeholder="Name and Number" type="text"/>
      </div>
      <div class="md:col-span-2">
        <label class="text-xs font-semibold uppercase tracking-wide text-slate-500">Local Address</label>
        <textarea class="w-full rounded-lg border-slate-300" name="localAddress" rows="4" placeholder="Current residence address"></textarea>
      </div>
      <div class="md:col-span-2 flex justify-end gap-3">
        <button class="px-6 py-2 border border-slate-300 rounded-lg font-semibold text-slate-600" data-action="support" type="button">Need Help</button>
        <button class="px-6 py-2 bg-[#1a237e] text-white rounded-lg font-semibold" data-action="profile-save" type="submit">Save Profile</button>
      </div>
    </form>
  </section>
</main>
<div id="screen-router" style="position: fixed; right: 16px; bottom: 16px; z-index: 9999; font-family: Inter, sans-serif;">
  <div style="display: flex; align-items: center; gap: 8px; background: #ffffff; border: 1px solid #c6c5d4; border-radius: 10px; padding: 8px 10px; box-shadow: 0 8px 22px rgba(0,0,0,0.08);">
    <button id="router-prev" type="button" style="border: 1px solid #c6c5d4; background: #f2f4f7; color: #1a237e; border-radius: 8px; padding: 6px 10px; cursor: pointer;">Prev</button>
    <label for="router-select" style="font-size: 12px; color: #454652;">Screen</label>
    <select id="router-select" style="border: 1px solid #c6c5d4; border-radius: 8px; padding: 6px 8px; color: #191c1e;"></select>
    <button id="router-next" type="button" style="border: 1px solid #c6c5d4; background: #1a237e; color: #ffffff; border-radius: 8px; padding: 6px 10px; cursor: pointer;">Next</button>
  </div>
</div>
<script src="../shared/runtime-config.js"></script>
<script src="../shared/app-shell.js"></script>
</body></html>
